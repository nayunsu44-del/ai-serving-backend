version: 2
updates:
  # Python dependencies pinned in requirements.txt
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    ignore:
      # pydantic-core is pinned transitively by pydantic (pydantic==X requires an
      # exact pydantic-core==Y). Bumping it alone breaks the lock, so let it ride
      # with pydantic instead of getting its own PRs.
      - dependency-name: pydantic-core

  # GitHub Actions versions in .github/workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
