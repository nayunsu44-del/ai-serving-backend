name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python 3.13)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        # `python -m` puts the project root on sys.path so `import app` resolves,
        # matching the documented `python -m pytest` invocation.
        run: python -m pytest -q

  docker:
    name: docker build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Build only (no push) so Dockerfile drift — e.g. a base-image/Python
      # version mismatch — fails CI instead of shipping a broken image.
      - name: Build image
        run: docker build -t ai-serving-backend:ci .

  audit:
    name: pip-audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      # Fail on known CVEs in the pinned dependency lock.
      - name: Run pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip-audit -r requirements.txt

  lint:
    name: ruff
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      # Pinned so a new ruff release can't fail CI without a deliberate bump.
      - name: Run ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.15.15
          ruff check .
